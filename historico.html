<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Barbearia Aldeia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <img src="fotoaldeia1.jpeg" alt="Barbearia Aldeia">
                <h1>Barbearia Aldeia</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="index.html#servicos">Serviços</a></li>
                <li><a href="agendamento.html">Agendar</a></li>
                <li><a href="historico.html" class="active">Histórico</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
    </header>

    <main>
        <div class="historico-wrapper">
            <div class="historico-header">
                <h2><i class="fas fa-history"></i> Histórico de agendamentos</h2>
                <p>Consulte seus agendamentos informando seu telefone</p>
            </div>

            <div class="form-card">
                <div class="card-header"><i class="fas fa-search"></i><h3>Buscar por telefone</h3></div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="telefoneBusca">Telefone (WhatsApp) <span class="required">*</span></label>
                        <input type="tel" id="telefoneBusca" placeholder="(11) 99999-9999" required>
                    </div>
                    <button id="btnBuscar" class="btn-submit" style="font-size: 1.2rem; padding: 0.8rem;">Buscar agendamentos</button>
                </div>
            </div>

            <div id="resultadoBusca" style="margin-top: 2rem;"></div>
        </div>
    </main>

    <footer id="contato">
        <p>&copy; 2025 Barbearia Aldeia - Todos os direitos reservados.</p>
        <div class="social">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="historico.js"></script>
</body>
</html>
